services:

    router:
        env_file:
          - path: .env.${ENV_STAGE:-dev}
            required: false
        build:
            context: ./dockerfiles/infrastructure
            dockerfile: router.dockerfile
        image: ${PROJECT_NAME}/router
        container_name: ${PROJECT_NAME}-router
        volumes:
            - ./code:/var/www/html
            - ./config/nginx/conf.d:/etc/nginx/conf.d
            - ./config/nginx/vhost.d/${ENV_STAGE:-dev}:/etc/nginx/vhost.d
            - ./logs/nginx:/var/log/nginx
        restart: unless-stopped
        networks:
            - inner
            - nginx-proxy

    backend:
        env_file:
          - path: .env.${ENV_STAGE:-dev}
            required: false
        build:
            context: ./dockerfiles/backend
            dockerfile: backend.dockerfile
            target: ${ENV_STAGE:-dev}
        profiles: ["backend"]
        image: ${PROJECT_NAME}/backend
        container_name: ${PROJECT_NAME}-backend
        environment:
            VIRTUAL_HOST: "${PROJECT_NAME}.${PROJECT_DOMAIN}"
            XDEBUG_CONFIG: "remote_host=host.docker.internal mode=debug remote_port=${XDEBUG_REMOTE_PORT}"
            PHP_IDE_CONFIG: "serverName=${PROJECT_NAME}"
        working_dir: /var/www/html/backend
        volumes:
            - ./code:/var/www/html # code
            - ./config/php-ini:/usr/local/etc/php # php.ini
            - ./logs/php:/log/php # logs
        networks:
            - inner
        extra_hosts:
            host.docker.internal: host-gateway

    frontend:
      env_file:
        - path: .env.${ENV_STAGE:-dev}
          required: false
      build:
          context: ./dockerfiles/frontend
          dockerfile: frontend.dockerfile
      profiles: ["frontend"]
      image: ${PROJECT_NAME}/frontend
      container_name: ${PROJECT_NAME}-frontend
      working_dir: /var/www/html/frontend
      volumes:
          - ./code:/var/www/html
      ports:
          - "${NODE_EXTERNAL_PORT}:5173"
      environment:
          __VITE_ADDITIONAL_SERVER_ALLOWED_HOSTS: ${PROJECT_NAME}.${PROJECT_DOMAIN}
      networks:
          - inner
      stdin_open: true
      tty: true

    # mariadb | postgres
    storage:
        env_file:
          - path: .env.${ENV_STAGE:-dev}
            required: false
        build:
            context: ./dockerfiles/storage
            dockerfile: ${DB_DOCKERFILE}
        profiles: ["storage"]
        image: ${PROJECT_NAME}/storage
        container_name: ${PROJECT_NAME}-storage
        volumes:
            - ${DB_DATA_VOLUME}
        environment:
            POSTGRES_DB: ${PROJECT_NAME}
            POSTGRES_USER: ${PROJECT_NAME}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            PGDATA: /var/lib/postgresql/data/pgdata
            MARIADB_USER: ${PROJECT_NAME}
            MARIADB_PASSWORD: ${PROJECT_NAME}
            MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
        ports:
            - "${DB_PORT}:${DB_PORT_INTERNAL}"
        command: ${DB_COMMAND}
        restart: unless-stopped
        networks:
            - inner

networks:
    nginx-proxy:
        external: true
        name: nginx-proxy
    inner:
        driver: bridge